<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid practice</title>
    <style>
        .container{
            width: 70%;
            height:600px;
            background-color: aqua;
            display: grid;
            grid-template-areas: 
            "header header header" 
            "main main aside"
            "section section aside"
            "footer footer footer";
            
        }
        .items{
            background-color: chocolate;
            border: 2px solid black;
        }
        #item1{
            grid-area: header;
        }
        #item2{
            grid-area: main;
        }
        #item3{
            grid-area: section;
        }
        #item4{
            grid-area: aside;
        }
        #item5{
            grid-area: footer;
        }

    </style>
</head>
<body>
<div class="container">
        <div class="items" id="item1">header</div>
        <div class="items" id="item2">main</div>
        <div class="items" id="item3">section</div>
        <div class="items" id="item4">aside</div>
        <div class="items" id="item5">footer</div>
</div>
</body>
</html>
