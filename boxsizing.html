<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box-sizing</title>
    <style>
        div {
            width: 200px;
            height: 200px;
            background-color: lightblue;
            border: 2px solid black;
            margin-bottom: 20px;
        }

        #d1 {
            padding: 30px;
        }

        #d2 {
            padding: 30px;
            box-sizing: border-box;
        }
        *{
            box-sizing: border-box;
        }
    </style>

</head>
<body>
    <div id="d1">hello world
    </div>
    <div id="d2">
        hello world     

    </div>
</body>
</html>
