<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid</title>
    <style>
        .container{
            width: 600px;
            height: 500px;
            border: 2px solid black;
            background-color: aqua;
            display: grid;
            /*grid-auto-flow: row;*/
            /*grid-auto-flow: column;*/
          /*grid-template-columns: 100px 200px 300px;*/
          /*grid-template-columns: 100px 2fr 3fr;*/
          /*grid-template-columns: 100px 200px auto;*/
            /*grid-template-rows: 100px 200px 100px;*/
            /*row-gap: 4px;
            column-gap: 3px;*/

        }

        .container> .items{
            background-color: brown;
            border: 2px solid black;
            margin: 5px;
        }

        #item2{
            /*grid-row-start: 1;
            grid-row-end: 2;
            grid-column-start: 2;
            grid-column-end: 4;*/
            grid-area: 1/2/2/4;
        }

        #item3{
            /*grid-row-start:2 ;
            grid-row-end: 3;
            grid-column-start: 1;
            grid-column-end: 3; */
            /*grid-row:2/3;
            grid-column:1/3;*/
            grid-area: 2/1/3/3;
        }
        #item5{
            /*grid-row-start: 3;
            grid-row-end: 4;
            grid-column-start: 1;
            grid-column-end: 4;*/
            grid-area: 3/1/4/4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="items" id="item1">Items1</div>
        <div class="items" id="item2">Items2</div>
        <div class="items" id="item3">Items3</div>
        <div class="items" id="item4">Items4</div>
        <div class="items" id="item5">Items5</div>
        <!-- <div class="items" id="item6">Items6</div>
        <div class="items" id="item7">Items7</div>
        <div class="items" id="item8">Items8</div>
        <div class="items" id="item9">Items9</div> -->
    </div>

    
</body>
</html>
