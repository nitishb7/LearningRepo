<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width:50%;
            height: 600px;
            background-color: azure;
            border: 2px solid black;
            display: grid;
            grid-template-areas: 
            "header header header"
            "sidebar content1 content1 "
            "sidebar content2 content3"
            "footer footer footer ";
            gap: 4px;
            padding: 6px;

        }

        .item{
            background-color: greenyellow;
            border: 2px solid black;
        }
        #item1{
            grid-area: header;
        }
        #item2{
            grid-area: sidebar;
        }
        #item3{
            grid-area: content1;
        }
        #item4{
            grid-area: content2;
        }
        #item5{
            grid-area: content3;
        }
        #item6{
            grid-area: footer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="item1">Header</div>
        <div class="item" id="item2">Side Bar</div>
        <div class="item" id="item3">content 1</div>
        <div class="item" id="item4">content 2</div>
        <div class="item" id="item5">content 3</div>
        <div class="item" id="item6">Footer</Footer></div>
    </div>
</body>
</html>
