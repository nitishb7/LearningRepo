<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline CSS</title>
    <style>
        h1{
            color: red;
            background-color: black;
        }
        body{
            background-color: lightblue;
        }
        h4{
            color: orange
        }
    </style>
</head>
<body>
    <!--Inline CSS is used to apply a unique style to a single HTML element. To use inline CSS, add the style attribute to the relevant element. The style attribute can contain any CSS property. -->
    <h1 style="color: aqua; background-color: black; ">Welcome to my page</h1>
    <h4>section 1</h4>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. 
        Aspernatur quisquam ullam culpa consequatur provident 
        cupiditate veritatis laudantium, reiciendis molestias 
        dicta aliquid recusandae deserunt ratione debitis omnis 
        ut minima blanditiis atque?</p>

    <h1>footer section</h1>    
</body>
</html>
